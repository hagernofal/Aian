services:
  postgres:
    image: postgres:16-alpine
    container_name: aian_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aian_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aian_password}
      POSTGRES_DB: ${POSTGRES_DB:-aian_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aian_user} -d ${POSTGRES_DB:-aian_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
